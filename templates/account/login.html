{% extends "base.html" %}
{% load socialaccount %}

{% block title %}Connexion — BeerCellar{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4">
      <i class="bi bi-cup-fill text-warning" style="font-size: 3rem;"></i>
      <h2 class="mt-2">BeerCellar</h2>
      <p class="text-muted">Connecte-toi pour accéder à ta cave</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="d-grid gap-3">
          <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger btn-lg">
            <i class="bi bi-google me-2"></i> Continuer avec Google
          </a>
          <a href="{% provider_login_url 'microsoft' %}" class="btn btn-outline-primary btn-lg">
            <i class="bi bi-microsoft me-2"></i> Continuer avec Microsoft
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
