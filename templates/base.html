<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BeerCellar{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'beer-list' %}">
        <i class="bi bi-cup-fill text-warning"></i> BeerCellar
      </a>
      {% if user.is_authenticated %}
        <div class="d-flex align-items-center gap-3">
          <span class="text-light small d-none d-sm-inline">{{ user.email }}</span>
          <a href="{% url 'beer-add' %}" class="btn btn-warning btn-sm">
            <i class="bi bi-plus-lg"></i> Ajouter
          </a>
          <a href="{% url 'account_logout' %}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i>
          </a>
        </div>
      {% endif %}
    </div>
  </nav>

  <main class="container my-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
